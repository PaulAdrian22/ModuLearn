<!DOCTYPE html>
<html>
<head>
    <title>UI Design Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        h2 {
            margin-top: 40px;
            margin-bottom: 20px;
        }
        .design-container {
            border: 2px solid #ddd;
            margin-bottom: 40px;
            overflow: auto;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ModuleArn UI Designs</h1>
        
        <h2>1. Landing Page</h2>
        <div class="design-container">
            <img src="../ui designs/1 Landing Page.svg" alt="Landing Page Design">
        </div>
        
        <h2>2. About Page</h2>
        <div class="design-container">
            <img src="../ui designs/2 About.svg" alt="About Page Design">
        </div>
    </div>
</body>
</html>
