[build]
  command = "npm ci --prefix frontend --no-audit --no-fund && npm run build --prefix frontend"
  publish = "frontend/build"
  ignore = "if [ -n \"$CACHED_COMMIT_REF\" ]; then git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF frontend netlify.toml; else exit 1; fi"

[build.environment]
  CI = "false"
  NODE_VERSION = "20"
  GENERATE_SOURCEMAP = "false"

[[redirects]]
  from = "/api/*"
  to = "https://modulearn-api-260412162638.azurewebsites.net/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
