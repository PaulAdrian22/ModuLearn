name: Deploy Backend to Azure App Service

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-azure-backend.yml

permissions:
  contents: read

concurrency:
  group: azure-backend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME || 'modulearn-api-260412162638' }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend --no-audit --no-fund

      - name: Validate Azure app name
        if: ${{ env.AZURE_WEBAPP_NAME == '' }}
        run: |
          echo "Missing repository variable AZURE_WEBAPP_NAME."
          echo "Set it in GitHub: Settings > Secrets and variables > Actions > Variables."
          exit 1

      - name: Deploy to Azure Web App (publish profile)
        if: ${{ env.AZURE_WEBAPP_PUBLISH_PROFILE != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ env.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend

      - name: Azure login (service principal)
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Apply production app settings defaults
        if: ${{ env.AZURE_CREDENTIALS != '' && env.AZURE_RESOURCE_GROUP != '' }}
        run: |
          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --settings \
              NODE_ENV=production \
              REQUEST_LOG_MODE=errors-only \
              UPLOAD_CACHE_MAX_AGE_SECONDS=86400 \
              DB_CONNECTION_LIMIT=5 \
              API_CACHE_TTL_SECONDS=120 \
              API_CACHE_MAX_ENTRIES=500

      - name: Deploy to Azure Web App (service principal fallback)
        if: ${{ env.AZURE_WEBAPP_PUBLISH_PROFILE == '' && env.AZURE_CREDENTIALS != '' }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: backend

      - name: Skip deploy when no Azure credentials are configured
        if: ${{ env.AZURE_WEBAPP_PUBLISH_PROFILE == '' && env.AZURE_CREDENTIALS == '' }}
        run: |
          echo "No Azure deployment credentials configured; skipping deployment."
          echo "Set AZURE_WEBAPP_PUBLISH_PROFILE or AZURE_CREDENTIALS to enable backend deployment."
