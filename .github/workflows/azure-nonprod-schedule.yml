name: Azure Non-Prod Start Stop Schedule

on:
  workflow_dispatch:
    inputs:
      action:
        description: Start or stop non-production Azure resources
        required: true
        type: choice
        options:
          - start
          - stop
        default: stop
  schedule:
    # 08:30 local (UTC+8) Monday-Friday
    - cron: '30 0 * * 1-5'
    # 22:00 local (UTC+8) Monday-Friday
    - cron: '0 14 * * 1-5'

permissions:
  contents: read

concurrency:
  group: azure-nonprod-schedule
  cancel-in-progress: true

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_NONPROD_ENABLED: ${{ vars.AZURE_NONPROD_ENABLED }}
      AZURE_NONPROD_RESOURCE_GROUP: ${{ vars.AZURE_NONPROD_RESOURCE_GROUP || vars.AZURE_RESOURCE_GROUP }}
      AZURE_NONPROD_WEBAPP_NAME: ${{ vars.AZURE_NONPROD_WEBAPP_NAME || vars.AZURE_WEBAPP_NAME }}
      AZURE_NONPROD_MYSQL_SERVER_NAME: ${{ vars.AZURE_NONPROD_MYSQL_SERVER_NAME }}
    steps:
      - name: Resolve requested action
        id: resolve_action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.action }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 14 * * 1-5" ]; then
            echo "value=stop" >> "$GITHUB_OUTPUT"
          else
            echo "value=start" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate guardrails
        run: |
          NONPROD_ENABLED=$(echo "${AZURE_NONPROD_ENABLED}" | tr '[:upper:]' '[:lower:]')
          if [ "${NONPROD_ENABLED}" != "true" ]; then
            echo "AZURE_NONPROD_ENABLED is not true. Skipping all actions."
            exit 0
          fi

          if [ -z "${AZURE_CREDENTIALS}" ]; then
            echo "Missing AZURE_CREDENTIALS secret."
            exit 1
          fi

          if [ -z "${AZURE_NONPROD_RESOURCE_GROUP}" ] || [ -z "${AZURE_NONPROD_WEBAPP_NAME}" ]; then
            echo "Missing AZURE_NONPROD_RESOURCE_GROUP or AZURE_NONPROD_WEBAPP_NAME repository variable."
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Start or stop App Service
        run: |
          ACTION="${{ steps.resolve_action.outputs.value }}"

          if [ "$ACTION" = "stop" ]; then
            az webapp stop --resource-group "$AZURE_NONPROD_RESOURCE_GROUP" --name "$AZURE_NONPROD_WEBAPP_NAME"
          else
            az webapp start --resource-group "$AZURE_NONPROD_RESOURCE_GROUP" --name "$AZURE_NONPROD_WEBAPP_NAME"
          fi

      - name: Start or stop MySQL Flexible Server
        run: |
          if [ -z "${AZURE_NONPROD_MYSQL_SERVER_NAME}" ]; then
            echo "AZURE_NONPROD_MYSQL_SERVER_NAME is not set. Skipping MySQL action."
            exit 0
          fi

          ACTION="${{ steps.resolve_action.outputs.value }}"
          if [ "$ACTION" = "stop" ]; then
            az mysql flexible-server stop --resource-group "$AZURE_NONPROD_RESOURCE_GROUP" --name "$AZURE_NONPROD_MYSQL_SERVER_NAME"
          else
            az mysql flexible-server start --resource-group "$AZURE_NONPROD_RESOURCE_GROUP" --name "$AZURE_NONPROD_MYSQL_SERVER_NAME"
          fi
