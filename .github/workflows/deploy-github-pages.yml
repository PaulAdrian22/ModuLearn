name: Deploy Frontend to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/deploy-github-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          npm ci --prefix frontend --no-audit --no-fund || npm install --prefix frontend --no-audit --no-fund

      - name: Build frontend
        env:
          CI: 'false'
          PUBLIC_URL: /${{ github.event.repository.name }}
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
        run: npm run build --prefix frontend

      - name: Configure SPA fallback
        run: cp frontend/build/index.html frontend/build/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check GitHub Pages configuration
        id: pages_check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")

          if [ "$STATUS" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled (status: $STATUS). Skipping deploy."
          fi

      - name: Deploy to GitHub Pages
        if: ${{ steps.pages_check.outputs.enabled == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment skipped notice
        if: ${{ steps.pages_check.outputs.enabled != 'true' }}
        run: |
          echo "Skipping GitHub Pages deployment because Pages is disabled for this repository."
          echo "Enable it at: https://github.com/${{ github.repository }}/settings/pages"
